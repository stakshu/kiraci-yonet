<!-- Connection Banner (Faz 0) -->
<div class="conn-banner" id="connBanner">
  <span id="connIcon">&#9881;&#65039;</span>
  <span id="connText">Supabase baglantisi kontrol ediliyor...</span>
</div>

<!-- Stat Cards -->
<div class="stat-grid">
  <div class="stat-card">
    <div class="stat-icon-box blue">
      <svg viewBox="0 0 24 24"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg>
    </div>
    <div class="stat-info">
      <div class="stat-number"><span id="statDaire">--</span></div>
      <div class="stat-label">Toplam Daire</div>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-icon-box green">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
    </div>
    <div class="stat-info">
      <div class="stat-number"><span id="statKiraci">--</span></div>
      <div class="stat-label">Dolu Daire</div>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-icon-box red">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><line x1="9" y1="22" x2="9" y2="12"/><line x1="15" y1="22" x2="15" y2="12"/></svg>
    </div>
    <div class="stat-info">
      <div class="stat-number"><span id="statBos">--</span></div>
      <div class="stat-label">Bos Daire</div>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-icon-box amber">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>
    <div class="stat-info">
      <div class="stat-number"><span id="statBekleyen">--</span></div>
      <div class="stat-label">Bekleyen Odeme</div>
    </div>
  </div>
</div>

<!-- Table Controls -->
<div class="table-controls">
  <div class="table-search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Daire ara..." id="aptSearchInput" />
  </div>
  <div class="table-filter-group">
    <select class="filter-btn" id="aptStatusFilter" style="cursor:pointer;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;">
      <option value="">Tum Durumlar</option>
      <option value="occupied">Dolu</option>
      <option value="vacant">Bos</option>
      <option value="expiring">Sure Doluyor</option>
    </select>
    <button class="btn btn-primary" onclick="openApartmentModal('add')">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Yeni Daire
    </button>
  </div>
</div>

<!-- Table -->
<div class="data-table-wrap">
  <table class="data-table">
    <thead>
      <tr>
        <th class="td-check"><input type="checkbox" /></th>
        <th>Bina / Konum</th>
        <th>Daire No</th>
        <th>Kiraci</th>
        <th>Kira (&#8378;)</th>
        <th>Sozlesme Bitis</th>
        <th>Durum</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted)">Yukleniyor...</td></tr>
    </tbody>
  </table>
</div>

<!-- ═══ Daire Ekle/Duzenle — Drawer Panel (Sagdan acilir) ═══ -->
<div class="drawer-overlay" id="aptModal" onclick="if(event.target===this)closeApartmentModal()">
  <div class="drawer">
    <div class="drawer-header">
      <div>
        <h3 class="drawer-title" id="aptModalTitle">Yeni Daire Ekle</h3>
        <p class="drawer-subtitle">Daire bilgilerini doldurun</p>
      </div>
      <button class="drawer-close" onclick="closeApartmentModal()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <form id="aptForm" onsubmit="saveApartment(event)">
      <input type="hidden" id="aptId" />

      <div class="drawer-body">
        <!-- Bina & Daire No -->
        <div class="drawer-section">
          <div class="drawer-section-title">
            <svg viewBox="0 0 24 24"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg>
            Konum Bilgileri
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="aptBuilding">Bina Adi *</label>
              <input class="form-input" id="aptBuilding" type="text" placeholder="Gunes Apt." required />
            </div>
            <div class="form-group">
              <label class="form-label" for="aptUnitNo">Daire No *</label>
              <input class="form-input" id="aptUnitNo" type="text" placeholder="D-001" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="aptCity">Sehir</label>
              <input class="form-input" id="aptCity" type="text" placeholder="Istanbul" />
            </div>
            <div class="form-group">
              <label class="form-label" for="aptDistrict">Ilce</label>
              <input class="form-input" id="aptDistrict" type="text" placeholder="Kadikoy" />
            </div>
          </div>
        </div>

        <!-- Kiraci & Kira -->
        <div class="drawer-section">
          <div class="drawer-section-title">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            Kiraci Bilgileri
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="aptTenant">Kiraci Adi</label>
              <input class="form-input" id="aptTenant" type="text" placeholder="Bos birakilabilir" />
            </div>
            <div class="form-group">
              <label class="form-label" for="aptRent">Aylik Kira (&#8378;)</label>
              <input class="form-input" id="aptRent" type="number" min="0" step="0.01" placeholder="0" />
            </div>
          </div>
        </div>

        <!-- Durum & Sozlesme -->
        <div class="drawer-section">
          <div class="drawer-section-title">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Sozlesme & Durum
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="aptLeaseEnd">Sozlesme Bitis</label>
              <input class="form-input" id="aptLeaseEnd" type="date" />
            </div>
            <div class="form-group">
              <label class="form-label" for="aptStatus">Durum</label>
              <select class="form-input" id="aptStatus">
                <option value="vacant">Bos</option>
                <option value="occupied">Dolu</option>
                <option value="expiring">Sure Doluyor</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Notlar -->
        <div class="drawer-section">
          <div class="drawer-section-title">
            <svg viewBox="0 0 24 24"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
            Notlar
          </div>
          <div class="form-group">
            <textarea class="form-input" id="aptNotes" rows="3" placeholder="Opsiyonel notlar..."></textarea>
          </div>
        </div>
      </div>

      <div class="drawer-footer">
        <button type="button" class="btn btn-outline" onclick="closeApartmentModal()">Iptal</button>
        <button type="submit" class="btn btn-primary" id="aptSaveBtn">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Kaydet
        </button>
      </div>
    </form>
  </div>
</div>
